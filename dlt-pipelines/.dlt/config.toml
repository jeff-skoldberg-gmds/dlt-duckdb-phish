# put your configuration values here

[runtime]
log_level = "INFO"  # the system log level of dlt — was WARNING, too quiet on the platform
dlthub_telemetry = false
workspace_id = "5d7ec811-f36a-435e-bb60-a42709e77348"
organization_id = "f5ea4d2b-d85e-418f-b4c1-c427ad6af81e"
# api.phish.net rate-limits attendance/uid/{uid}.json; --full-sweep-attendance fires one
# request per user concurrently and was exhausting the default 5 retries under 429s
request_max_attempts = 10
request_backoff_factor = 2

[normalize.parquet_normalizer]
# emit _dlt_load_id for arrow/parquet data
add_dlt_load_id = true

[workspace.settings]
name = "concerts"

[sources.phish_pipeline]
base_url = "https://api.phish.net/v5/"
# users/user_attendance is the full user-attendance join (potentially tens/hundreds of
# millions of rows, one request per user) — off until incremental strategy is implemented,
# see docs/user-attendance-incremental-options.md
enable_user_attendance = false
resources = [
    { name = "shows", endpoint = "shows.json" },
    { name = "setlists", endpoint = "setlists.json" },
    { name = "songs", endpoint = "songs.json" },
    { name = "venues", endpoint = "venues.json" },
    { name = "artists", endpoint = "artists.json" },
]

[sources.phish_pipeline.resource_defaults.endpoint.params]
limit = 0

[data_writer]
file_max_items = 100000

[sources]
file_max_items = 100000

[extract]
workers = 6
# caps concurrent in-flight @dlt.defer futures (user_attendance fetches), independent of
# `workers` thread count — keeps the phish.net rate limit from being slammed on full sweeps
max_parallel_items = 5

[normalize]
workers = 4
start_method = "spawn"
