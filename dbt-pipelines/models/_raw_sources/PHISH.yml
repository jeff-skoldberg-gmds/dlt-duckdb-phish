version: 2

sources:
  - name: PHISH
    schema: phish_data
    tables:
      - name: ARTISTS
        identifier: artists
        description: >
          Source for Artists related to Phish. No longer produced by dlt's
          phish_core_pipeline (only shows/setlists/songs/venues are extracted) —
          this source and stg_phishapi__artists.sql will fail until an artists
          resource is added back or the model is removed.
        columns:
          - name: _AIRBYTE_RAW_ID
            description: ""
            data_type: TEXT
            tests: []
          - name: ID
            data_type: TEXT
            tests:
              - unique
              - not_null
          - name: SLUG
            data_type: TEXT
          - name: ARTIST
            data_type: TEXT
          - name: _AIRBYTE_META
            data_type: VARIANT
          - name: _AIRBYTE_EXTRACTED_AT
            data_type: TIMESTAMP_TZ
        config:
          tags:
            - source
          meta:
            experts:
              users:
                - jeff@gmdata.co
              teams: []
            tier: tier 3
            asset_status: verified
